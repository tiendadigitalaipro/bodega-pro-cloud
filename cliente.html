<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mi Cuenta — Bodega Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#08080f;--card:#12121e;--border:rgba(124,58,237,0.2);--accent:#7c3aed;--neon:#06d6a0;--warn:#f59e0b;--danger:#ef4444;--text:#e8e8f0;--text2:#8888aa;--mono:'JetBrains Mono',monospace}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px}
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
/* LOGIN */
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:340px;text-align:center}
.login-icon{font-size:52px;margin-bottom:12px}
.login-title{font-size:20px;font-weight:800;margin-bottom:4px}
.login-title span{color:var(--accent)}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:15px;outline:none;margin-bottom:10px;font-family:inherit;transition:border-color 0.2s}
.input:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),#9d5bf4);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.err{color:var(--danger);font-size:12px;margin-top:8px;display:none}
/* APP */
#appCli{display:none;padding-bottom:32px}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header-brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--neon));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.brand-title{font-size:15px;font-weight:800}
.brand-title span{color:var(--accent)}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:inherit}
.body{padding:16px;max-width:480px;margin:0 auto}
/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.neon::before{background:linear-gradient(90deg,var(--neon),#00f5c3)}
.stat-card.accent::before{background:linear-gradient(90deg,var(--accent),#9d5bf4)}
.stat-card.warn::before{background:linear-gradient(90deg,var(--warn),#f97316)}
.stat-card.danger::before{background:linear-gradient(90deg,var(--danger),#f87171)}
.stat-val{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
/* SECTION */
.sec-title{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--text2);text-transform:uppercase;margin-bottom:10px}
/* COMPRA CARD */
.compra-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.compra-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.compra-fecha{font-size:12px;color:var(--text2)}
.compra-monto{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--neon)}
.compra-items{font-size:12px;color:var(--text2);line-height:1.6}
.compra-metodo{font-size:11px;color:var(--accent);font-weight:700;margin-top:6px}
/* DEUDA */
.deuda-banner{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:16px;margin-bottom:16px;text-align:center}
.deuda-val{font-family:var(--mono);font-size:28px;font-weight:900;color:var(--danger)}
.deuda-lbl{font-size:12px;color:var(--text2);margin-top:4px}
/* PAGO CARD */
.pago-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.pago-fecha{font-size:12px;color:var(--text2)}
.pago-monto{font-family:var(--mono);color:var(--neon);font-weight:700}
.empty{text-align:center;padding:24px;color:var(--text2);font-size:13px}
/* SPINNER */
.spinner{text-align:center;padding:40px;font-size:13px;color:var(--text2)}
/* ADMIN */
.admin-badge{display:inline-block;background:rgba(245,158,11,.15);color:var(--warn);border:1px solid rgba(245,158,11,.3);border-radius:6px;font-size:10px;font-weight:700;padding:2px 8px;letter-spacing:.5px;margin-left:8px;vertical-align:middle}
.cli-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.cli-row-info{}
.cli-row-name{font-size:14px;font-weight:700}
.cli-row-sub{font-size:11px;color:var(--text2);margin-top:2px}
.cli-row-stats{text-align:right;flex-shrink:0}
.cli-deuda{font-family:var(--mono);font-size:16px;font-weight:700}
.cli-deuda.red{color:var(--danger)}
.cli-deuda.green{color:var(--neon)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginCli" class="screen" style="display:flex">
  <div class="login-box">
    <div class="login-icon">🏪</div>
    <div class="login-title">Mi <span>Cuenta</span></div>
    <div class="login-sub" id="loginSubtitle">Ingresa el nombre del negocio y tu código de acceso</div>
    <input type="text" id="negocioInput" class="input" placeholder="Ej: ZYNC Electronics"
      style="text-align:center;margin-bottom:10px">
    <input type="text" id="pinInput" class="input" placeholder="Ej: BP-CLI-Y4SPJY"
      onkeydown="if(event.key==='Enter')accederCliente()"
      style="text-align:center;font-family:var(--mono)">
    <button class="btn-primary" onclick="accederCliente()">🔓 Acceder</button>
    <div id="loginErr" class="err">❌ Código incorrecto o cliente no encontrado</div>
  </div>
</div>

<!-- APP -->
<div id="appCli" style="display:none">
  <div class="header">
    <div class="header-brand">
      <div class="brand-icon">🏪</div>
      <div>
        <div class="brand-title">Bodega <span>Pro</span></div>
        <div id="clienteNombreHeader" style="font-size:11px;color:var(--text2)">Mi Cuenta</div>
      </div>
    </div>
    <button class="logout-btn" onclick="cerrarSesionCliente()">Salir →</button>
  </div>
  <div class="body">
    <div id="cliContent"><div class="spinner">⏳ Cargando...</div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyCfAh2-K5oe1XPVFvB4jbN62nSOTFq22jo",
  authDomain:"bodega-pro-cloud.firebaseapp.com",
  projectId:"bodega-pro-cloud",
  storageBucket:"bodega-pro-cloud.firebasestorage.app",
  messagingSenderId:"245806066684",
  appId:"1:245806066684:web:e45935a6bbe96c9a17a079"
};
const app = initializeApp(cfg);
const db  = getFirestore(app);

var _clienteData = null;
var _negocioData = null;

// Función helper: 4 dígitos con ceros a la izquierda
function codigoProd(id) {
  return String(parseInt(id) || 0).padStart(4, '0');
}

// Genera todas las variantes posibles de un nombre de negocio
function generarCandidatos(nombre) {
  var base = nombre.trim();
  var normalizado = base.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,'')
    .trim();
  var conGuion     = normalizado.replace(/\s+/g,'_');
  var sinSeparador = normalizado.replace(/\s+/g,'');
  var primeraWord  = conGuion.split('_')[0];
  // Deduplicar manteniendo orden de preferencia
  var todos = [conGuion, base.replace(/\s+/g,'_').toLowerCase(),
               sinSeparador, primeraWord, base.toLowerCase()];
  return todos.filter(function(v, i, arr){ return v && arr.indexOf(v) === i; });
}

window.accederCliente = async function() {
  var negocioRaw = document.getElementById('negocioInput').value.trim();
  var pin = document.getElementById('pinInput').value.trim().toUpperCase();
  var err = document.getElementById('loginErr');
  var btn = document.querySelector('.btn-primary');
  err.style.display = 'none';

  // Validaciones previas
  if (!negocioRaw) {
    err.textContent = '❌ Ingresa el nombre del negocio';
    err.style.display = 'block'; return;
  }
  if (!pin || pin.length < 6 || pin.length > 15 || !/^[A-Z0-9\-]+$/.test(pin)) {
    err.textContent = '❌ Ingresa un código de acceso válido (Ej: BP-CLI-Y4SPJY)';
    err.style.display = 'block'; return;
  }

  if (btn) { btn.textContent = '⏳ Verificando...'; btn.disabled = true; }

  try {
    var data = null;
    var docIdEncontrado = null;

    console.log('[DEBUG] Buscando negocio:', negocioRaw);
    console.log('[DEBUG] Buscando código:', pin);

    // 1. Intentar con cada variante del nombre como doc ID
    var candidatos = generarCandidatos(negocioRaw);
    console.log('[DEBUG] Candidatos doc ID:', candidatos);
    for (var i = 0; i < candidatos.length; i++) {
      var snap = await getDoc(doc(db, 'negocios', candidatos[i]));
      console.log('[DEBUG] Probando doc ID "' + candidatos[i] + '":', snap.exists() ? 'ENCONTRADO' : 'no existe');
      if (snap.exists()) { data = snap.data(); docIdEncontrado = candidatos[i]; break; }
    }

    // 2. Fallback: escanear toda la colección con múltiples estrategias
    if (!data) {
      console.log('[DEBUG] Paso 1 sin resultado. Escaneando colección completa...');
      var colSnap = await getDocs(collection(db, 'negocios'));
      console.log('[DEBUG] Documentos en colección "negocios":', colSnap.size);

      var busquedaNorm = negocioRaw.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[^a-z0-9]/g,'').trim();

      colSnap.forEach(function(d) {
        if (data) return;
        var docData = d.data();
        var docId   = d.id;

        // Normalizar doc ID y campo localId para comparación
        var idNorm  = docId.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
        var lidNorm = (docData.localId || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
        // También comparar con el nombre del negocio si existe
        var nombreNorm = (docData.nombre || docData.negocio || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');

        console.log('[DEBUG] Doc:', docId, '| idNorm:', idNorm, '| lidNorm:', lidNorm, '| busquedaNorm:', busquedaNorm);

        if (idNorm === busquedaNorm || lidNorm === busquedaNorm || nombreNorm === busquedaNorm) {
          data = docData; docIdEncontrado = docId;
          console.log('[DEBUG] MATCH encontrado por normalización en doc:', docId);
        }
      });

      if (!data) {
        console.log('[DEBUG] Sin match exacto. Intentando coincidencia parcial...');
        colSnap.forEach(function(d) {
          if (data) return;
          var docId  = d.id;
          var idNorm = docId.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
          var lidNorm = (d.data().localId || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
          if (idNorm.includes(busquedaNorm) || busquedaNorm.includes(idNorm) ||
              lidNorm.includes(busquedaNorm) || busquedaNorm.includes(lidNorm)) {
            data = d.data(); docIdEncontrado = docId;
            console.log('[DEBUG] MATCH parcial en doc:', docId);
          }
        });
      }
    }

    if (!data) {
      console.log('[DEBUG] No se encontró ningún documento para:', negocioRaw);
      err.textContent = '❌ Negocio no encontrado. Verifica el nombre en tu factura.';
      err.style.display = 'block'; return;
    }

    console.log('[DEBUG] Negocio encontrado, doc ID:', docIdEncontrado);
    console.log('[DEBUG] Clientes en el negocio:', (data.clientes || []).length);

    // Verificar código maestro de administrador (por defecto '0000', o el guardado en Firebase)
    var adminPin = data.adminPin ? String(data.adminPin).trim().toUpperCase() : '0000';
    if (pin === adminPin) {
      _negocioData = data;
      document.getElementById('loginCli').style.display = 'none';
      document.getElementById('appCli').style.display = 'block';
      document.getElementById('clienteNombreHeader').textContent =
        (data.localId || negocioRaw).replace(/_/g,' ').toUpperCase();
      // Marcar modo admin en header
      var headerTitle = document.getElementById('clienteNombreHeader');
      headerTitle.innerHTML = (data.localId || negocioRaw).replace(/_/g,' ').toUpperCase()
        + '<span class="admin-badge">ADMIN</span>';
      renderDashboardAdmin(data);
      return;
    }

    // Validar código de acceso — obligatorio, debe coincidir exactamente (normalizado a mayúsculas)
    var clientes = data.clientes || [];
    var cliente = clientes.find(function(c){
      return c.pin && String(c.pin).trim().toUpperCase() === pin;
    });
    if (!cliente) {
      err.textContent = '❌ Código incorrecto';
      err.style.display = 'block'; return;
    }
    _clienteData = cliente;
    _negocioData = data;
    document.getElementById('loginCli').style.display = 'none';
    document.getElementById('appCli').style.display = 'block';
    document.getElementById('clienteNombreHeader').textContent = cliente.nombre;
    renderDashboardCliente(data, cliente);
  } catch(e) {
    err.textContent = '❌ Error de conexión: ' + e.message;
    err.style.display = 'block';
  } finally {
    if (btn) { btn.textContent = '🔓 Acceder'; btn.disabled = false; }
  }
};

window.cerrarSesionCliente = function() {
  _clienteData = null; _negocioData = null;
  document.getElementById('pinInput').value = '';
  document.getElementById('negocioInput').value = '';
  document.getElementById('appCli').style.display = 'none';
  document.getElementById('loginCli').style.display = 'flex';
};

function renderDashboardCliente(negocio, cliente) {
  var ventas = (negocio.ventas || []).filter(function(v){ return v.cliente === cliente.id; });
  ventas.sort(function(a,b){ return new Date(b.fecha) - new Date(a.fecha); });
  var totalComprado = ventas.reduce(function(s,v){ return s + v.totalUSD; }, 0);
  var deuda = cliente.deuda || 0;
  var pagosHist = (negocio.pagos_clientes || []).filter(function(p){ return p.clienteId === cliente.id; });

  var html = '';

  // Stats
  html += '<div style="margin-bottom:16px">';
  html += '<div style="font-size:18px;font-weight:800;margin-bottom:2px">Hola, ' + cliente.nombre + ' 👋</div>';
  html += '<div style="font-size:12px;color:var(--text2)">' + (negocio.localId || 'Tu negocio').replace(/_/g,' ').toUpperCase() + '</div>';
  html += '</div>';

  html += '<div class="stats-grid">';
  html += '<div class="stat-card neon"><div class="stat-val" style="color:var(--neon)">$' + totalComprado.toFixed(2) + '</div><div class="stat-lbl">Total Comprado</div></div>';
  html += '<div class="stat-card ' + (deuda > 0 ? 'danger' : 'neon') + '">';
  html += '<div class="stat-val" style="color:' + (deuda > 0 ? 'var(--danger)' : 'var(--neon)') + '">$' + deuda.toFixed(2) + '</div>';
  html += '<div class="stat-lbl">Deuda Actual</div></div>';
  html += '<div class="stat-card accent"><div class="stat-val" style="color:var(--accent)">' + ventas.length + '</div><div class="stat-lbl">Compras</div></div>';
  html += '<div class="stat-card warn"><div class="stat-val" style="color:var(--warn)">$' + (cliente.limite || 50).toFixed(0) + '</div><div class="stat-lbl">Límite Fiado</div></div>';
  html += '</div>';

  // Deuda banner
  if (deuda > 0) {
    html += '<div class="deuda-banner">'
      + '<div class="deuda-val">$' + deuda.toFixed(2) + '</div>'
      + '<div class="deuda-lbl">Deuda pendiente con el negocio</div>'
      + '</div>';
  }

  // Compras recientes
  html += '<div class="sec-title">🛒 Compras Recientes</div>';
  if (!ventas.length) {
    html += '<div class="empty">📭 Sin compras registradas</div>';
  } else {
    ventas.slice(0, 15).forEach(function(v){
      html += '<div class="compra-card">';
      html += '<div class="compra-top">';
      html += '<div><div style="font-weight:700;font-size:13px">Compra #' + String(v.id).slice(-5) + '</div>';
      html += '<div class="compra-fecha">📅 ' + new Date(v.fecha).toLocaleString('es-VE') + '</div></div>';
      html += '<div class="compra-monto">$' + v.totalUSD.toFixed(2) + '</div></div>';
      if (v.items && v.items.length) {
        html += '<div class="compra-items">';
        // Tabla de items con código de 4 dígitos
        html += '<table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:4px">';
        html += '<thead><tr style="color:var(--text2);border-bottom:1px solid var(--border)">'
          + '<th style="text-align:left;padding:2px 4px;font-weight:600">Cód.</th>'
          + '<th style="text-align:left;padding:2px 4px;font-weight:600">Producto</th>'
          + '<th style="text-align:center;padding:2px 4px;font-weight:600">Cant.</th>'
          + '<th style="text-align:right;padding:2px 4px;font-weight:600">Total</th>'
          + '</tr></thead><tbody>';
        v.items.forEach(function(it){
          html += '<tr style="border-bottom:1px solid rgba(255,255,255,0.04)">'
            + '<td style="padding:3px 4px;font-family:monospace;color:var(--accent);font-weight:700">'
              + codigoProd(it.productoId) + '</td>'
            + '<td style="padding:3px 4px;color:var(--text)">' + (it.nombre || '—') + '</td>'
            + '<td style="padding:3px 4px;text-align:center;color:var(--text2)">x' + it.qty + '</td>'
            + '<td style="padding:3px 4px;text-align:right;color:var(--neon);font-family:monospace;font-weight:700">'
              + '$' + (it.subtotal||0).toFixed(2) + '</td>'
            + '</tr>';
        });
        html += '</tbody></table>';
        html += '</div>';
      }
      html += '<div class="compra-metodo">💳 ' + v.metodo + '</div>';
      html += '</div>';
    });
  }

  // Pagos realizados
  if (pagosHist.length) {
    html += '<div class="sec-title" style="margin-top:16px">💰 Pagos Realizados</div>';
    pagosHist.slice(-10).reverse().forEach(function(p){
      html += '<div class="pago-card">';
      html += '<div><div style="font-weight:700;font-size:13px">' + (p.metodo || 'Pago') + '</div>';
      html += '<div class="pago-fecha">' + new Date(p.fecha).toLocaleDateString('es-VE') + '</div></div>';
      html += '<div class="pago-monto">$' + (p.monto||0).toFixed(2) + '</div>';
      html += '</div>';
    });
  }

  html += '<div style="text-align:center;font-size:10px;color:var(--text2);margin-top:24px">Bodega Pro Cloud · A2K Digital Studio</div>';

  document.getElementById('cliContent').innerHTML = html;
}

function renderDashboardAdmin(negocio) {
  var clientes = negocio.clientes || [];
  var ventas   = negocio.ventas   || [];
  var pagos    = negocio.pagos_clientes || [];

  // Calcular stats por cliente
  var clientesStats = clientes.map(function(c) {
    var cv = ventas.filter(function(v){ return v.cliente === c.id; });
    var totalComprado = cv.reduce(function(s,v){ return s + (v.totalUSD||0); }, 0);
    return { c: c, totalComprado: totalComprado, numCompras: cv.length, deuda: c.deuda || 0 };
  });

  // Ordenar por deuda descendente
  clientesStats.sort(function(a,b){ return b.deuda - a.deuda; });

  var totalClientes  = clientes.length;
  var totalDeuda     = clientes.reduce(function(s,c){ return s + (c.deuda||0); }, 0);
  var totalComprados = clientesStats.reduce(function(s,cs){ return s + cs.totalComprado; }, 0);
  var conDeuda       = clientes.filter(function(c){ return (c.deuda||0) > 0; }).length;

  var html = '';

  html += '<div style="margin-bottom:16px">';
  html += '<div style="font-size:18px;font-weight:800;margin-bottom:2px">Panel Admin 🔐</div>';
  html += '<div style="font-size:12px;color:var(--text2)">Vista general de todos los clientes</div>';
  html += '</div>';

  // Summary stats
  html += '<div class="stats-grid">';
  html += '<div class="stat-card accent"><div class="stat-val" style="color:var(--accent)">' + totalClientes + '</div><div class="stat-lbl">Clientes</div></div>';
  html += '<div class="stat-card ' + (totalDeuda > 0 ? 'danger' : 'neon') + '">';
  html += '<div class="stat-val" style="color:' + (totalDeuda > 0 ? 'var(--danger)' : 'var(--neon)') + '">$' + totalDeuda.toFixed(2) + '</div>';
  html += '<div class="stat-lbl">Deuda Total</div></div>';
  html += '<div class="stat-card neon"><div class="stat-val" style="color:var(--neon)">$' + totalComprados.toFixed(2) + '</div><div class="stat-lbl">Total Vendido</div></div>';
  html += '<div class="stat-card warn"><div class="stat-val" style="color:var(--warn)">' + conDeuda + '</div><div class="stat-lbl">Con Deuda</div></div>';
  html += '</div>';

  // Lista de clientes
  html += '<div class="sec-title">👥 Todos los Clientes</div>';
  if (!clientesStats.length) {
    html += '<div class="empty">📭 Sin clientes registrados</div>';
  } else {
    clientesStats.forEach(function(cs) {
      var c = cs.c;
      html += '<div class="cli-row">';
      html += '<div class="cli-row-info">';
      html += '<div class="cli-row-name">' + (c.nombre || 'Sin nombre') + '</div>';
      html += '<div style="font-size:10px;color:var(--accent);font-family:monospace;font-weight:700;margin-bottom:2px">Código: ' + codigoProd(c.id) + '</div>';
      html += '<div class="cli-row-sub">📦 ' + cs.numCompras + ' compras · $' + cs.totalComprado.toFixed(2) + ' comprado';
      if (c.telefono) html += ' · 📱 ' + c.telefono;
      html += '</div>';
      if (c.limite) html += '<div style="font-size:10px;color:var(--text2);margin-top:2px">Límite fiado: $' + (c.limite||0).toFixed(0) + '</div>';
      html += '</div>';
      html += '<div class="cli-row-stats">';
      html += '<div class="cli-deuda ' + (cs.deuda > 0 ? 'red' : 'green') + '">$' + cs.deuda.toFixed(2) + '</div>';
      html += '<div style="font-size:10px;color:var(--text2)">' + (cs.deuda > 0 ? 'debe' : 'al día') + '</div>';
      html += '</div>';
      html += '</div>';
    });
  }

  html += '<div style="text-align:center;font-size:10px;color:var(--text2);margin-top:24px">Bodega Pro Cloud · A2K Digital Studio</div>';
  document.getElementById('cliContent').innerHTML = html;
}
</script>
</body>
</html>
