<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Panel de Licencias — A2K Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080f;--card:#12121e;--border:rgba(124,58,237,0.2);--accent:#7c3aed;--neon:#06d6a0;--warn:#f59e0b;--danger:#ef4444;--text:#e8e8f0;--text2:#8888aa;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}

/* Login */
.screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:340px;text-align:center}
.login-icon{font-size:52px;margin-bottom:12px}
.login-title{font-size:20px;font-weight:800;margin-bottom:4px}
.login-title span{color:var(--accent)}
.login-sub{font-size:12px;color:var(--text2);margin-bottom:20px}
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:15px;outline:none;margin-bottom:10px;font-family:inherit;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),#9d5bf4);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.err{color:var(--danger);font-size:12px;margin-top:8px;display:none}

/* App */
#appPanel{display:none}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--neon));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:800}
.hdr-title span{color:var(--accent)}
.hdr-sub{font-size:11px;color:var(--text2)}
.body{padding:16px;max-width:960px;margin:0 auto;padding-bottom:32px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
@media(max-width:700px){.stats{grid-template-columns:1fr 1fr}}
.scard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.scard.total::before{background:linear-gradient(90deg,var(--accent),#9d5bf4)}
.scard.activas::before{background:linear-gradient(90deg,var(--neon),#00f5c3)}
.scard.vencidas::before{background:linear-gradient(90deg,var(--warn),#f97316)}
.scard.inactivas::before{background:linear-gradient(90deg,var(--danger),#f87171)}
.scard.demos::before{background:linear-gradient(90deg,#fb923c,#f59e0b)}
.scard-val{font-family:var(--mono);font-size:28px;font-weight:700;line-height:1}
.scard-lbl{font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--text2);text-transform:uppercase}
.btn-new{padding:10px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),#9d5bf4);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-refresh{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit}

/* License card */
.lic-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.lic-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.lic-code{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--neon);letter-spacing:1px}
.lic-name{font-size:14px;font-weight:700;margin-top:3px}
.lic-negocio{font-size:12px;color:var(--text2);margin-top:2px}
.badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
.badge-ok{background:rgba(6,214,160,.15);color:var(--neon);border:1px solid rgba(6,214,160,.3)}
.badge-warn{background:rgba(245,158,11,.15);color:var(--warn);border:1px solid rgba(245,158,11,.3)}
.badge-off{background:rgba(136,136,170,.15);color:var(--text2);border:1px solid rgba(136,136,170,.3)}
.badge-demo{background:rgba(251,146,60,.15);color:#fb923c;border:1px solid rgba(251,146,60,.4)}
.lic-details{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
@media(max-width:500px){.lic-details{grid-template-columns:1fr 1fr}}
.lic-det-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.lic-det-val{font-size:13px;font-weight:600;margin-top:2px}
.lic-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{padding:7px 13px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-deact{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.btn-act{background:rgba(6,214,160,.12);color:var(--neon);border:1px solid rgba(6,214,160,.3)}
.btn-copy{background:rgba(124,58,237,.12);color:var(--accent);border:1px solid rgba(124,58,237,.3)}
.btn-edit{background:rgba(59,130,246,.12);color:#3b82f6;border:1px solid rgba(59,130,246,.3)}
.btn-wa{background:rgba(37,211,102,.12);color:#25d366;border:1px solid rgba(37,211,102,.3)}
.btn-del{background:rgba(239,68,68,.06);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.empty{text-align:center;padding:40px;color:var(--text2);font-size:13px}
.loading-state{text-align:center;padding:40px;color:var(--text2)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.form-input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}
select.form-input{cursor:pointer}
.modal-footer{display:flex;gap:10px;margin-top:20px}
.btn-cancel{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-save{flex:2;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),#9d5bf4);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-save:disabled{opacity:.6;cursor:default}

/* Renewal badge */
.ren-warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--warn);margin-top:8px}
/* Demo card highlight */
.lic-card.is-demo{border-left:3px solid #fb923c}
.lic-code.demo{color:#fb923c}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPanel" class="screen">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">Panel <span>A2K</span></div>
    <div class="login-sub">Gestión de licencias · Bodega Pro SaaS</div>
    <input type="password" id="masterPin" class="inp"
      placeholder="PIN administrador"
      onkeydown="if(event.key==='Enter')accederPanel()"
      style="text-align:center;font-size:20px;letter-spacing:6px;font-family:var(--mono)">
    <button class="btn-primary" onclick="accederPanel()">🔓 Ingresar</button>
    <div id="panelErr" class="err">❌ PIN incorrecto</div>
  </div>
</div>

<!-- APP -->
<div id="appPanel">
  <div class="hdr">
    <div class="hdr-brand">
      <div class="hdr-icon">🔑</div>
      <div>
        <div class="hdr-title">A2K <span>Studio</span></div>
        <div class="hdr-sub">Panel de Licencias · Bodega Pro</div>
      </div>
    </div>
    <div style="font-size:11px;color:var(--text2);font-family:var(--mono)" id="lastSync">—</div>
  </div>

  <div class="body">
    <!-- Stats -->
    <div class="stats">
      <div class="scard total">
        <div class="scard-val" id="statTotal" style="color:var(--accent)">0</div>
        <div class="scard-lbl">Total</div>
      </div>
      <div class="scard activas">
        <div class="scard-val" id="statActivas" style="color:var(--neon)">0</div>
        <div class="scard-lbl">Activas</div>
      </div>
      <div class="scard vencidas">
        <div class="scard-val" id="statVencidas" style="color:var(--warn)">0</div>
        <div class="scard-lbl">Vencidas</div>
      </div>
      <div class="scard inactivas">
        <div class="scard-val" id="statInactivas" style="color:var(--danger)">0</div>
        <div class="scard-lbl">Inactivas</div>
      </div>
      <div class="scard demos">
        <div class="scard-val" id="statDemos" style="color:#fb923c">0</div>
        <div class="scard-lbl">Demos Activas</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="sec-title">🔑 Licencias Emitidas</div>
      <div style="display:flex;gap:8px">
        <button class="btn-refresh" onclick="cargarLicencias()">🔄 Actualizar</button>
        <button class="btn-new" onclick="abrirCrear()">+ Nueva Licencia</button>
      </div>
    </div>

    <!-- List -->
    <div id="listaLicencias">
      <div class="loading-state">⏳ Cargando licencias...</div>
    </div>
  </div>
</div>

<!-- Modal Crear / Editar -->
<div id="modalCrear" class="overlay" style="display:none">
  <div class="modal">
    <div class="modal-title" id="modalCrearTitle">✨ Nueva Licencia</div>

    <div class="form-group">
      <label class="form-label">Nombre del Cliente *</label>
      <input type="text" id="m-nombre" class="form-input" placeholder="Juan Pérez">
    </div>
    <div class="form-group">
      <label class="form-label">Nombre del Negocio *</label>
      <input type="text" id="m-negocio" class="form-input" placeholder="Bodega La 23">
    </div>
    <div class="form-group">
      <label class="form-label">Teléfono / WhatsApp</label>
      <input type="text" id="m-telefono" class="form-input" placeholder="+58 414 000 0000">
    </div>
    <div class="form-group">
      <label class="form-label">Email (opcional)</label>
      <input type="email" id="m-email" class="form-input" placeholder="cliente@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Plan</label>
      <select id="m-plan" class="form-input">
        <option value="demo" selected>🆓 Demo — 3 días GRATIS</option>
        <option value="30">30 días (1 mes)</option>
        <option value="60">60 días (2 meses)</option>
        <option value="90">90 días (3 meses)</option>
        <option value="180">180 días (6 meses)</option>
        <option value="365">365 días (1 año)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Notas (opcional)</label>
      <input type="text" id="m-notas" class="form-input" placeholder="Referido, descuento, observaciones...">
    </div>
    <input type="hidden" id="m-id-edit">

    <div class="modal-footer">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-save" id="btnGuardar" onclick="guardarLicencia()">💾 Crear Licencia</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, doc, getDocs, setDoc, updateDoc, deleteDoc }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyCfAh2-K5oe1XPVFvB4jbN62nSOTFq22jo",
  authDomain:"bodega-pro-cloud.firebaseapp.com",
  projectId:"bodega-pro-cloud",
  storageBucket:"bodega-pro-cloud.firebasestorage.app",
  messagingSenderId:"245806066684",
  appId:"1:245806066684:web:e45935a6bbe96c9a17a079"
};
const app = initializeApp(cfg);
const db  = getFirestore(app);

// ─── Config ──────────────────────────────────────────────────
const MASTER_PIN = 'a2k2025';

// ─── State ───────────────────────────────────────────────────
var _lics = [];

// ─── Login ───────────────────────────────────────────────────
window.accederPanel = function() {
  var pin = document.getElementById('masterPin').value;
  var err = document.getElementById('panelErr');
  if (pin !== MASTER_PIN) {
    err.style.display = 'block';
    setTimeout(function(){ err.style.display = 'none'; }, 2500);
    return;
  }
  document.getElementById('loginPanel').style.display = 'none';
  document.getElementById('appPanel').style.display = 'block';
  cargarLicencias();
};

// ─── Helpers ─────────────────────────────────────────────────
function getEstado(lic) {
  if (!lic.activa) return { label:'⚫ Inactiva', cls:'badge-off' };
  if (new Date(lic.fechaVencimiento) < new Date()) return { label:'⏰ Vencida', cls:'badge-warn' };
  return { label:'✅ Activa', cls:'badge-ok' };
}

function diasRestantes(fechaVenc) {
  return Math.ceil((new Date(fechaVenc) - new Date()) / 86400000);
}

function fmtFecha(iso) {
  return new Date(iso).toLocaleDateString('es-VE', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function generarCodigo() {
  var c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  var seg = function(n){ var s=''; for(var i=0;i<n;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; };
  return 'BP-' + seg(4) + '-' + seg(4) + '-' + seg(4);
}

// ─── Load ────────────────────────────────────────────────────
window.cargarLicencias = async function() {
  document.getElementById('listaLicencias').innerHTML = '<div class="loading-state">⏳ Cargando...</div>';
  try {
    var snap = await getDocs(collection(db, 'licencias'));
    _lics = [];
    snap.forEach(function(d){ _lics.push(Object.assign({ _id: d.id }, d.data())); });
    _lics.sort(function(a,b){ return new Date(b.creadaEn) - new Date(a.creadaEn); });
    renderLicencias();
    document.getElementById('lastSync').textContent =
      'Actualizado: ' + new Date().toLocaleTimeString('es-VE', { hour:'2-digit', minute:'2-digit' });
  } catch(e) {
    document.getElementById('listaLicencias').innerHTML =
      '<div class="empty">⚠️ Error conectando con Firebase: ' + e.message + '</div>';
  }
};

// ─── Render ──────────────────────────────────────────────────
function renderLicencias() {
  var now = new Date();
  var total = _lics.length, activas = 0, vencidas = 0, inactivas = 0, demos = 0;
  _lics.forEach(function(l) {
    if (!l.activa) { inactivas++; return; }
    var vencida = new Date(l.fechaVencimiento) < now;
    if (vencida) { vencidas++; return; }
    if (l.tipo === 'DEMO') demos++;
    activas++;
  });
  document.getElementById('statTotal').textContent    = total;
  document.getElementById('statActivas').textContent  = activas;
  document.getElementById('statVencidas').textContent = vencidas;
  document.getElementById('statInactivas').textContent = inactivas;
  document.getElementById('statDemos').textContent    = demos;

  if (!_lics.length) {
    document.getElementById('listaLicencias').innerHTML =
      '<div class="empty">📭 No hay licencias creadas aún.<br>Haz clic en <strong>+ Nueva Licencia</strong> para comenzar.</div>';
    return;
  }

  var html = '';
  _lics.forEach(function(lic) {
    var esDemo = lic.tipo === 'DEMO';
    var estado = getEstado(lic);
    var dias   = diasRestantes(lic.fechaVencimiento);
    var diasColor = dias > 14 ? 'var(--neon)' : dias > 0 ? 'var(--warn)' : 'var(--danger)';
    var diasTxt = lic.activa
      ? (dias > 0 ? dias + ' días restantes' : 'Vencida hace ' + Math.abs(dias) + ' días')
      : '—';
    var telefonoLimpio = (lic.telefono || '').replace(/[^0-9]/g, '');
    var msgWA = encodeURIComponent(
      (esDemo
        ? '🆓 *Prueba Gratuita — Bodega Pro*\n'
        : '🔑 *Tu Licencia Bodega Pro*\n') +
      'Código: *' + lic.codigo + '*\n' +
      'Negocio: ' + (lic.negocio || '') + '\n' +
      'Vence: ' + fmtFecha(lic.fechaVencimiento) + '\n\n' +
      '📲 Acceso: https://tiendadigitalaipro.github.io/bodega-pro-cloud/\n' +
      (esDemo ? '¡Pruébalo gratis por 3 días!' : '¡Gracias por elegir Bodega Pro!')
    );

    html += '<div class="lic-card' + (esDemo ? ' is-demo' : '') + '">';

    // Top row
    html += '<div class="lic-top">';
    html += '<div>';
    html += '<div class="lic-code' + (esDemo ? ' demo' : '') + '">' + lic.codigo + '</div>';
    html += '<div class="lic-name">' + (lic.nombreCliente || '—') + '</div>';
    html += '<div class="lic-negocio">🏪 ' + (lic.negocio || '—') + '</div>';
    if (lic.telefono) html += '<div class="lic-negocio" style="margin-top:2px">📱 ' + lic.telefono + '</div>';
    html += '</div>';
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">';
    if (esDemo) html += '<span class="badge badge-demo">🆓 DEMO</span>';
    html += '<span class="badge ' + estado.cls + '">' + estado.label + '</span>';
    html += '</div>';
    html += '</div>';

    // Details grid
    html += '<div class="lic-details">';
    html += '<div><div class="lic-det-lbl">Plan</div><div class="lic-det-val">' + (esDemo ? '3 días (DEMO)' : (lic.plan || '—') + ' días') + '</div></div>';
    html += '<div><div class="lic-det-lbl">Inicio</div><div class="lic-det-val">' + fmtFecha(lic.fechaInicio) + '</div></div>';
    html += '<div><div class="lic-det-lbl">Vence</div><div class="lic-det-val">' + fmtFecha(lic.fechaVencimiento) + '</div></div>';
    html += '<div><div class="lic-det-lbl">Vigencia</div><div class="lic-det-val" style="color:' + diasColor + '">' + diasTxt + '</div></div>';
    if (lic.email) html += '<div><div class="lic-det-lbl">Email</div><div class="lic-det-val" style="font-size:12px">' + lic.email + '</div></div>';
    if (lic.notas) html += '<div><div class="lic-det-lbl">Notas</div><div class="lic-det-val" style="font-size:12px">' + lic.notas + '</div></div>';
    html += '</div>';

    // Warnings
    if (lic.activa && dias <= 7 && dias > 0) {
      if (esDemo) {
        html += '<div class="ren-warn" style="border-color:rgba(251,146,60,.4);color:#fb923c;background:rgba(251,146,60,.08)">🆓 Demo próxima a vencer. Contacta al cliente para convertirla en licencia PRO.</div>';
      } else {
        html += '<div class="ren-warn">⚠️ Licencia próxima a vencer. Considera contactar al cliente para renovar.</div>';
      }
    }

    // Actions
    html += '<div class="lic-actions">';
    if (lic.activa) {
      html += '<button class="btn-sm btn-deact" onclick="toggleLic(\'' + lic._id + '\',false)">🚫 Desactivar</button>';
    } else {
      html += '<button class="btn-sm btn-act" onclick="toggleLic(\'' + lic._id + '\',true)">✅ Activar</button>';
    }
    html += '<button class="btn-sm btn-copy" onclick="copiarCodigo(\'' + lic.codigo + '\')">📋 Copiar</button>';
    html += '<button class="btn-sm btn-edit" onclick="abrirEditar(\'' + lic._id + '\')">✏️ Editar</button>';
    if (telefonoLimpio) {
      html += '<button class="btn-sm btn-wa" onclick="window.open(\'https://wa.me/' + telefonoLimpio + '?text=' + msgWA + '\',\'_blank\')">💬 WhatsApp</button>';
    }
    html += '<button class="btn-sm btn-del" onclick="eliminarLic(\'' + lic._id + '\')">🗑️</button>';
    html += '</div>';

    html += '</div>';
  });

  document.getElementById('listaLicencias').innerHTML = html;
}

// ─── Modal ───────────────────────────────────────────────────
window.abrirCrear = function() {
  document.getElementById('modalCrearTitle').textContent = '✨ Nueva Licencia';
  document.getElementById('m-nombre').value   = '';
  document.getElementById('m-negocio').value  = '';
  document.getElementById('m-telefono').value = '';
  document.getElementById('m-email').value    = '';
  document.getElementById('m-plan').value     = 'demo';
  document.getElementById('m-notas').value    = '';
  document.getElementById('m-id-edit').value  = '';
  document.getElementById('btnGuardar').textContent = '💾 Crear Licencia';
  document.getElementById('modalCrear').style.display = 'flex';
  setTimeout(function(){ document.getElementById('m-nombre').focus(); }, 100);
};

window.abrirEditar = function(id) {
  var lic = _lics.find(function(l){ return l._id === id; });
  if (!lic) return;
  document.getElementById('modalCrearTitle').textContent = '✏️ Editar Licencia';
  document.getElementById('m-nombre').value   = lic.nombreCliente || '';
  document.getElementById('m-negocio').value  = lic.negocio || '';
  document.getElementById('m-telefono').value = lic.telefono || '';
  document.getElementById('m-email').value    = lic.email || '';
  document.getElementById('m-plan').value     = lic.tipo === 'DEMO' ? 'demo' : String(lic.plan || 30);
  document.getElementById('m-notas').value    = lic.notas || '';
  document.getElementById('m-id-edit').value  = id;
  document.getElementById('btnGuardar').textContent = '💾 Actualizar';
  document.getElementById('modalCrear').style.display = 'flex';
};

window.cerrarModal = function() {
  document.getElementById('modalCrear').style.display = 'none';
};

// ─── Save ────────────────────────────────────────────────────
window.guardarLicencia = async function() {
  var nombre   = document.getElementById('m-nombre').value.trim();
  var negocio  = document.getElementById('m-negocio').value.trim();
  var telefono = document.getElementById('m-telefono').value.trim();
  var email    = document.getElementById('m-email').value.trim();
  var planVal  = document.getElementById('m-plan').value;
  var esDemo   = planVal === 'demo';
  var plan     = esDemo ? 3 : parseInt(planVal);
  var tipo     = esDemo ? 'DEMO' : 'PRO';
  var notas    = document.getElementById('m-notas').value.trim();
  var idEdit   = document.getElementById('m-id-edit').value;

  if (!nombre || !negocio) {
    alert('⚠️ Completa nombre del cliente y nombre del negocio.');
    return;
  }

  var btn = document.getElementById('btnGuardar');
  btn.textContent = '⏳ Guardando...';
  btn.disabled = true;

  try {
    var ahora = new Date().toISOString();

    if (idEdit) {
      // Edición — recalcular vencimiento desde fechaInicio original + nuevo plan
      var orig = _lics.find(function(l){ return l._id === idEdit; });
      var inicioRef = orig ? new Date(orig.fechaInicio) : new Date();
      var nuevaFechaVenc = new Date(inicioRef);
      nuevaFechaVenc.setDate(nuevaFechaVenc.getDate() + plan);
      await updateDoc(doc(db, 'licencias', idEdit), {
        nombreCliente: nombre, negocio, telefono, email, plan, tipo, notas,
        fechaVencimiento: nuevaFechaVenc.toISOString()
      });
    } else {
      // Nueva licencia
      var codigo = generarCodigo();
      var vencimiento = new Date();
      vencimiento.setDate(vencimiento.getDate() + plan);
      await setDoc(doc(db, 'licencias', codigo), {
        codigo, nombreCliente: nombre, negocio, telefono, email, plan, tipo, notas,
        activa: true,
        fechaInicio: ahora,
        fechaVencimiento: vencimiento.toISOString(),
        creadaEn: ahora
      });
    }

    cerrarModal();
    await cargarLicencias();
  } catch(e) {
    alert('❌ Error guardando: ' + e.message);
  } finally {
    btn.textContent = idEdit ? '💾 Actualizar' : '💾 Crear Licencia';
    btn.disabled = false;
  }
};

// ─── Toggle ──────────────────────────────────────────────────
window.toggleLic = async function(id, activar) {
  var lic = _lics.find(function(l){ return l._id === id; });
  if (!lic) return;
  var accion = activar ? 'activar' : 'desactivar';
  if (!confirm((activar ? '✅ Activar' : '🚫 Desactivar') + ' la licencia de ' + lic.nombreCliente + '?')) return;
  try {
    await updateDoc(doc(db, 'licencias', id), { activa: activar });
    await cargarLicencias();
  } catch(e) {
    alert('❌ Error: ' + e.message);
  }
};

// ─── Delete ──────────────────────────────────────────────────
window.eliminarLic = async function(id) {
  var lic = _lics.find(function(l){ return l._id === id; });
  if (!lic) return;
  if (!confirm('⚠️ ¿Eliminar permanentemente la licencia de ' + lic.nombreCliente + ' (' + lic.codigo + ')?\n\nEsta acción no se puede deshacer y el cliente perderá acceso.')) return;
  try {
    await deleteDoc(doc(db, 'licencias', id));
    await cargarLicencias();
  } catch(e) {
    alert('❌ Error: ' + e.message);
  }
};

// ─── Copy ────────────────────────────────────────────────────
window.copiarCodigo = function(codigo) {
  navigator.clipboard.writeText(codigo)
    .then(function(){ alert('✅ Código copiado al portapapeles:\n' + codigo); })
    .catch(function(){ prompt('Copia este código de activación:', codigo); });
};
</script>
</body>
</html>
